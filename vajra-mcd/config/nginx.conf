worker_processes  1;
error_log  logs/error.log;

events {
    worker_connections  1024;
}

http {
    types {
        text/html                             html htm shtml;
        text/css                              css;
        text/xml                              xml;
        image/gif                             gif;
        image/jpeg                            jpeg jpg;
        application/javascript                js;
        application/atom+xml                  atom;
        application/rss+xml                   rss;
        font/woff                             woff;
        font/woff2                            woff2;
        image/png                             png;
        image/svg+xml                         svg svgz;
        image/x-icon                          ico;
        application/json                      json;
    }
    default_type  application/octet-stream;

    lua_package_path "/Users/nandiniatal/.luarocks/share/lua/5.1/?.lua;;";
    lua_package_cpath "/Users/nandiniatal/.luarocks/lib/lua/5.1/?.so;;";

    server {
        listen       10101;
        server_name  localhost;
        root /Users/nandiniatal/Desktop/final_project/vajra-mcd;

        location / {
            index portal/index.html;
        }

        location /portal/ {
            alias /Users/nandiniatal/Desktop/final_project/vajra-mcd/portal/;
        }

        location /api/v1/telemetry {
    add_header 'Access-Control-Allow-Origin' 'http://localhost:8081' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;

    if ($request_method = 'OPTIONS') {
        return 204;
    }

    default_type application/json;
    return 200 '{"status":"ok"}';
}
        location /api/v1/search {
            # --- START CORS FIX ---
            add_header 'Access-Control-Allow-Origin' 'http://localhost:8081' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' 'http://localhost:8081' always;
                return 204;
            }
            # --- END CORS FIX ---

            default_type application/json;
            content_by_lua_block {
                local status, err = pcall(function()
                    local sqlite3 = require "lsqlite3"
                    local args = ngx.req.get_uri_args()
                    local pid = (args.pid or ""):gsub("%s+", "")
                    
                    local is_hack = pid:match("['\"%;]") or pid:lower():match("or%s+1=1") or pid:lower():match("union")                    
                    local db_path, query
                    if is_hack then
                        db_path = "/Users/nandiniatal/Desktop/final_project/vajra-mcd/database/mcd_shadow_vault.db"
                        query = "SELECT * FROM property_records LIMIT 5000"
                    else
                        db_path = "/Users/nandiniatal/Desktop/final_project/vajra-mcd/database/mcd_production.db"
                        query = "SELECT * FROM property_records WHERE property_id = '" .. pid .. "'"
                    end

                    local db = sqlite3.open(db_path)
                    local results = {}
                    for row in db:nrows(query) do table.insert(results, row) end
                    
                    local cjson = require "cjson"
                    ngx.say(cjson.encode(results))
                    db:close()
                end)
                if not status then
                    ngx.status = 500
                    ngx.say('{"error": "SERVER_LOGGED_EXCEPTION"}')
                end
            }
        }
    }
}